name: Auto News Posts

on:
  # Roda toda segunda, quarta e sexta às 09:00 UTC (06:00 Brasília)
  schedule:
    - cron: '0 9 * * 1,3,5'

  # Permite rodar manualmente pela aba Actions do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar script de notícias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commitar novos posts (se houver)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions — News Bot"
          git add src/content/blog/ scripts/.seen_articles.json
          # Só commita se houver mudanças
          git diff --staged --quiet || git commit -m "chore: auto-publish security news [skip ci]"
          git push
